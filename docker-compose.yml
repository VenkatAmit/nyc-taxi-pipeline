# docker-compose.yml
#
# Local development stack for cab-spark-data-pipeline.
#
# Core services (always started):
#   postgres      — bronze + silver data store (Postgres 15)
#   airflow_db    — Airflow metadata database (Postgres 15)
#   airflow_init  — one-shot Airflow DB migration + admin user
#   airflow_web   — Airflow webserver (http://localhost:8080)
#   airflow_sched — Airflow scheduler
#
# Optional tools (start with --profile tools):
#   jupyter       — JupyterLab for exploration (http://localhost:8888)
#   superset      — Apache Superset for dashboards (http://localhost:8088)
#
# Usage:
#   docker compose up -d                      # core services
#   docker compose --profile tools up -d     # + jupyter + superset
#   docker compose run --rm bronze           # one-shot bronze ingest
#   docker compose run --rm gold             # one-shot gold load

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.2-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow_db:5432/${AIRFLOW_DB_NAME}"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    # Pipeline Postgres connection (matches PostgresSettings env vars)
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Delta Lake
    DELTA_GOLD_BASE_PATH: ${DELTA_GOLD_BASE_PATH:-/data/gold}
    DELTA_CHECKPOINT_PATH: ${DELTA_CHECKPOINT_PATH:-/data/checkpoints}
    # dbt project location inside the Airflow worker
    dbt_project_dir: /opt/airflow/dbt
    #python
    PYTHONPATH: "/opt/airflow"
    #PIP ADDITIONAL REQUIREMENTS
    _PIP_ADDITIONAL_REQUIREMENTS: "psycopg[binary]>=3.2 pydantic-settings>=2.3 great-expectations==0.18.19 dbt-postgres==1.7.18"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./dbt:/opt/airflow/dbt
    - ./pipeline:/opt/airflow/pipeline
    - ./data:/data
    - airflow_logs:/opt/airflow/logs
  depends_on:
    airflow_db:
      condition: service_healthy
  networks:
    - pipeline_net

services:

  # ── Pipeline database (bronze + silver) ──────────────────────────────────
  postgres:
    image: postgres:15
    container_name: pipeline_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - pipeline_net

  # ── Airflow metadata database ─────────────────────────────────────────────
  airflow_db:
    image: postgres:15
    container_name: airflow_db
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_DB_NAME:-airflow}
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_DB_USER:-airflow}"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - pipeline_net

  # ── Airflow initialisation ────────────────────────────────────────────────
  airflow_init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    restart: on-failure
    networks:
      - pipeline_net

  # ── Airflow webserver ─────────────────────────────────────────────────────
  airflow_web:
    <<: *airflow-common
    container_name: airflow_web
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    networks:
      - pipeline_net

  # ── Airflow scheduler ─────────────────────────────────────────────────────
  airflow_sched:
    <<: *airflow-common
    container_name: airflow_sched
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    networks:
      - pipeline_net

  # ── Bronze worker (one-shot ingest) ──────────────────────────────────────
  bronze:
    build:
      context: .
      dockerfile: docker/Dockerfile.bronze
    container_name: pipeline_bronze
    env_file: .env
    volumes:
      - ./data:/data
    profiles: [run]
    networks:
      - pipeline_net
    depends_on:
      postgres:
        condition: service_healthy

  # ── Gold worker (one-shot Delta load) ────────────────────────────────────
  gold:
    build:
      context: .
      dockerfile: docker/Dockerfile.gold
      args:
        JDBC_VERSION: "42.7.3"
    container_name: pipeline_gold
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ./data:/data
    profiles: [run]
    networks:
      - pipeline_net
    depends_on:
      postgres:
        condition: service_healthy

  # ── JupyterLab (optional) ─────────────────────────────────────────────────
  jupyter:
    image: jupyter/pyspark-notebook:python-3.11
    container_name: pipeline_jupyter
    profiles: [tools]
    ports:
      - "8888:8888"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./pipeline:/home/jovyan/pipeline
    networks:
      - pipeline_net
    depends_on:
      postgres:
        condition: service_healthy

  # ── Apache Superset (optional) ────────────────────────────────────────────
  superset:
    image: apache/superset:3.1.0
    container_name: pipeline_superset
    profiles: [tools]
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-supersetsecretkey}
    volumes:
      - superset_data:/app/superset_home
    networks:
      - pipeline_net
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin
          --username admin --firstname Admin --lastname User
          --email admin@example.com --password admin || true &&
        superset init &&
        superset run -p 8088 --with-threads --reload --debugger
      "

networks:
  pipeline_net:
    driver: bridge

volumes:
  postgres_data:
  airflow_db_data:
  airflow_logs:
  superset_data:
