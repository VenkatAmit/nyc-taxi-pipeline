
x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@airflow_db:5432/${POSTGRES_DB}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    PIPELINE_DB_USER: ${PIPELINE_DB_USER}
    PIPELINE_DB_PASSWORD: ${PIPELINE_DB_PASSWORD}
    PIPELINE_DB_NAME: ${PIPELINE_DB_NAME}
    PIPELINE_DB_HOST: ${PIPELINE_DB_HOST}
    PIPELINE_DB_PORT: ${PIPELINE_DB_PORT}
    DATA_DIR: ${DATA_DIR}
    TLC_BASE_URL: ${TLC_BASE_URL}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/tasks:/opt/airflow/tasks
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/data:/opt/airflow/data
    - ./dbt:/opt/airflow/dbt
    - ./great_expectations/reports:/opt/airflow/ge_reports
  mem_limit: 3g
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    airflow_db:
      condition: service_healthy
  networks:
    - taxi_net

services:

  airflow_db:
    image: postgres:15
    container_name: airflow_db
    mem_limit: 512m
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - taxi_net

  pipeline_db:
    image: postgres:15
    container_name: pipeline_db
    mem_limit: 1500m
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=64MB
        -c maintenance_work_mem=128MB
        -c max_connections=20
    environment:
      POSTGRES_USER: ${PIPELINE_DB_USER}
      POSTGRES_PASSWORD: ${PIPELINE_DB_PASSWORD}
      POSTGRES_DB: ${PIPELINE_DB_NAME}
    volumes:
      - pipeline_db_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${PIPELINE_DB_USER}"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - taxi_net

  airflow_init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - >
        airflow db migrate &&
        airflow users create
        --username admin
        --password admin
        --firstname Admin
        --lastname User
        --role Admin
        --email admin@example.com
    restart: on-failure
    networks:
      - taxi_net

  airflow_webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    mem_limit: 1g
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    networks:
      - taxi_net

  airflow_scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    mem_limit: 4g
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    networks:
      - taxi_net

  superset:
    image: apache/superset:3.1.0
    container_name: superset
    profiles: [tools]
    mem_limit: 1g
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-supersetsecretkey}
    ports:
      - "8088:8088"
    volumes:
      - superset_data:/app/superset_home
    networks:
      - taxi_net
    depends_on:
      pipeline_db:
        condition: service_healthy
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin
          --username admin --firstname Admin --lastname User
          --email admin@example.com --password admin || true &&
        superset init &&
        superset run -p 8088 --with-threads --reload --debugger
      "

  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: jupyter
    profiles: [tools]
    mem_limit: 2g
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./airflow/data/delta:/home/jovyan/delta
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      PIPELINE_DB_HOST: ${PIPELINE_DB_HOST}
      PIPELINE_DB_PORT: ${PIPELINE_DB_PORT}
      PIPELINE_DB_NAME: ${PIPELINE_DB_NAME}
      PIPELINE_DB_USER: ${PIPELINE_DB_USER}
      PIPELINE_DB_PASSWORD: ${PIPELINE_DB_PASSWORD}
    networks:
      - taxi_net
    depends_on:
      pipeline_db:
        condition: service_healthy

networks:
  taxi_net:
    driver: bridge

volumes:
  airflow_db_data:
  pipeline_db_data:
  superset_data:
