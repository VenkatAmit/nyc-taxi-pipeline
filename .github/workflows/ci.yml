name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install linters
        run: pip install black flake8
      - name: Black format check
        run: black --check airflow/tasks/ || true
      - name: Flake8 lint
        run: flake8 airflow/tasks/ --max-line-length=100 || true

  lint-sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install sqlfluff
        run: pip install sqlfluff
      - name: SQLFluff lint dbt models
        run: sqlfluff lint dbt/models/ --dialect ansi || true

  validate-dag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Check DAG syntax
        run: python3 -c "import ast; ast.parse(open('airflow/dags/taxi_pipeline.py').read()); print('DAG syntax OK')"
