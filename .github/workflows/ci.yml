name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11"
  PYTHON_TOOLING_VERSION: "3.14"
  PYTHON_SPARK_VERSION: "3.11"

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_TOOLING_VERSION }}
      - name: Install dev dependencies
        run: uv sync --frozen
      - name: Ruff lint
        run: uv run ruff check pipeline/ cli/ dags/
      - name: Ruff format check
        run: uv run ruff format --check pipeline/ cli/ dags/
      - name: Black format check
        run: uv run black --check pipeline/ cli/ dags/
      - name: mypy --strict
        run: uv run mypy pipeline/ cli/

  lint-sql:
    name: SQL lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_SPARK_VERSION }}
      - name: Install sqlfluff
        run: pip install sqlfluff==3.4.0
      - name: SQLFluff lint
        run: sqlfluff lint dbt/models/ --dialect postgres --config dbt/.sqlfluff

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: test_cab_pipeline
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      DELTA_GOLD_BASE_PATH: /tmp/gold
      DELTA_CHECKPOINT_PATH: /tmp/checkpoints
      AIRFLOW_API_URL: http://localhost:8080
      AIRFLOW_USERNAME: admin
      AIRFLOW_PASSWORD: admin
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_SPARK_VERSION }}
      - name: Install dependencies
        run: uv sync --frozen --python ${{ env.PYTHON_SPARK_VERSION }}
      - name: Run tests
        run: |
          uv run pytest tests/ \
            --tb=short \
            --junit-xml=test-results.xml \
            -v \
            --ignore=tests/test_dag_integrity.py
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml
          retention-days: 7

  dag-check:
    name: DAG integrity check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_SPARK_VERSION }}
      - name: Check DAG syntax
        run: |
          python3 - << 'EOF'
          import ast, sys
          files = ["dags/bronze_dag.py", "dags/gold_dag.py"]
          errors = []
          for path in files:
              try:
                  ast.parse(open(path).read())
                  print(f"  OK  {path}")
              except SyntaxError as e:
                  errors.append(f"  FAIL  {path}: {e}")
          if errors:
              [print(e) for e in errors]
              sys.exit(1)
          print("All DAG files parse cleanly.")
          EOF
      - name: Check banned imports in DAGs
        run: |
          python3 - << 'EOF'
          import ast, sys
          banned = ["psycopg", "pyspark", "delta"]
          files = ["dags/bronze_dag.py", "dags/gold_dag.py"]
          violations = []
          for path in files:
              tree = ast.parse(open(path).read())
              for node in ast.walk(tree):
                  if isinstance(node, ast.Import):
                      for a in node.names:
                          if any(a.name.startswith(b) for b in banned):
                              violations.append(f"{path}: imports {a.name!r}")
                  if isinstance(node, ast.ImportFrom):
                      mod = node.module or ""
                      if any(mod.startswith(b) for b in banned):
                          violations.append(f"{path}: imports from {mod!r}")
          if violations:
              [print(v) for v in violations]
              sys.exit(1)
          print("No banned imports in DAG files.")
          EOF
      - name: Check CLI import boundaries
        run: |
          python3 - << 'EOF'
          import ast, sys
          from pathlib import Path
          banned = ["pipeline.bronze", "pipeline.gold", "pipeline.silver", "pipeline.spark_session"]
          violations = []
          for path in Path("cli").rglob("*.py"):
              tree = ast.parse(path.read_text())
              for node in ast.walk(tree):
                  if isinstance(node, ast.ImportFrom):
                      mod = node.module or ""
                      if any(mod.startswith(b) for b in banned):
                          violations.append(f"{path}: imports from {mod!r}")
                  if isinstance(node, ast.Import):
                      for a in node.names:
                          if any(a.name.startswith(b) for b in banned):
                              violations.append(f"{path}: imports {a.name!r}")
          if violations:
              [print(v) for v in violations]
              sys.exit(1)
          print("CLI import boundaries respected.")
          EOF

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  docker-bronze:
    name: Docker build (bronze)
    runs-on: ubuntu-latest
    needs: [test, dag-check]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build bronze image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.bronze
          push: false
          tags: cab-pipeline-bronze:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-gold:
    name: Docker build (gold)
    runs-on: ubuntu-latest
    needs: [test, dag-check]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build gold image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.gold
          push: false
          tags: cab-pipeline-gold:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            JDBC_VERSION=42.7.3
