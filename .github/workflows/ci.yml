name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.11"

      - name: Install dev dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check pipeline/ cli/ dags/ || true

      - name: Black format check
        run: uv run black --check pipeline/ cli/ dags/ || true

      - name: mypy
        run: uv run mypy pipeline/ || true

  lint-sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: SQLFluff lint dbt models
        run: sqlfluff lint dbt/models/ --dialect postgres || true

  validate-dag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Check DAG syntax
        run: |
          python3 -c "
          import ast, sys
          files = ['dags/bronze_dag.py', 'dags/gold_dag.py']
          for f in files:
              ast.parse(open(f).read())
              print(f'DAG syntax OK: {f}')
          "
